services:
  db:
    image: mariadb:11
    restart: always
    environment:
      MARIADB_ROOT_PASSWORD: ${DB_PASSWORD}
      MARIADB_DATABASE: ${DB_NAME}
      # Least-privilege application user (granted ALL on MARIADB_DATABASE only,
      # which still covers Prisma migrations). The app connects as this user
      # instead of root. Both vars must be set for the user to be created.
      MARIADB_USER: ${DB_APP_USER}
      MARIADB_PASSWORD: ${DB_APP_PASSWORD}
    volumes:
      - db_data:/var/lib/mysql
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "mariadb-admin ping -h localhost -p$$MARIADB_ROOT_PASSWORD",
        ]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    image: sirvinny/cheebo-backend:${IMAGE_TAG:-latest}
    restart: always
    depends_on:
      db:
        condition: service_healthy
    environment:
      # Database — connect as the least-privilege app user, not root.
      DB_HOST: db
      DB_PORT: 3306
      DB_USER: ${DB_APP_USER}
      DB_PASSWORD: ${DB_APP_PASSWORD}
      DB_NAME: ${DB_NAME}
      # App
      NODE_ENV: production
      PORT: ${PORT}
      BETTER_AUTH_SECRET: ${BETTER_AUTH_SECRET}
      BETTER_AUTH_URL: ${APP_URL}
      FRONTEND_URL: ${APP_URL}
      # Stripe payments (required in production — the backend fail-fasts without them)
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY}
      STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET}
      # Admin (auto-created on first startup)
      ADMIN_NAME: ${ADMIN_NAME}
      ADMIN_EMAIL: ${ADMIN_EMAIL}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD}
      # Upload
      UPLOAD_DIR: ./uploads
      MAX_UPLOAD_FILE_SIZE_MB: ${MAX_UPLOAD_FILE_SIZE_MB}
      ALLOWED_UPLOAD_MIME_TYPES: ${ALLOWED_UPLOAD_MIME_TYPES}
      # Auth / Session
      SESSION_EXPIRES_IN: ${SESSION_EXPIRES_IN}
      SESSION_UPDATE_AGE: ${SESSION_UPDATE_AGE}
      MIN_PASSWORD_LENGTH: ${MIN_PASSWORD_LENGTH}
      EMAIL_VERIFICATION_EXPIRES_IN: ${EMAIL_VERIFICATION_EXPIRES_IN}
      # Swagger (set to empty to disable in prod)
      SWAGGER_PATH: ${SWAGGER_PATH}
      # SMTP
      SMTP_HOST: ${SMTP_HOST}
      SMTP_USER: ${SMTP_USER}
      SMTP_PORT: ${SMTP_PORT}
      SMTP_SECURE: ${SMTP_SECURE}
      SMTP_PASS: ${SMTP_PASS}
      SMTP_FROM: ${SMTP_FROM}
      # Premium feature limits
      FREE_TIER_MAX_PRODUCTS: ${FREE_TIER_MAX_PRODUCTS}
      FREE_TIER_MAX_STORES: ${FREE_TIER_MAX_STORES}
      PREMIUM_TEMPLATES: ${PREMIUM_TEMPLATES}
      PREMIUM_PRICE_TND: ${PREMIUM_PRICE_TND}
      PREMIUM_DURATION_DAYS: ${PREMIUM_DURATION_DAYS}
      # Home page limits
      MAX_FEATURED_PRODUCTS: ${MAX_FEATURED_PRODUCTS}
      MAX_FEATURED_STORES: ${MAX_FEATURED_STORES}
      # AI Chat (n8n webhook)
      N8N_WEBHOOK_URL: http://n8n:5678/webhook/cheebo-ai-chat
      N8N_WEBHOOK_SECRET: ${N8N_WEBHOOK_SECRET}
      # AI Verification (n8n verify webhook)
      N8N_VERIFY_WEBHOOK_URL: http://n8n:5678/webhook/cheebo-ai-verify
      # AI Store Redesign (n8n redesign webhook)
      N8N_REDESIGN_WEBHOOK_URL: http://n8n:5678/webhook/cheebo-store-redesign
    volumes:
      - uploads:/app/uploads

  frontend:
    image: sirvinny/cheebo-frontend:${IMAGE_TAG:-latest}
    restart: always
    depends_on:
      - backend
    environment:
      VITE_API_URL: ${APP_URL}
      VITE_PREMIUM_PRICE_TND: ${PREMIUM_PRICE_TND}
      VITE_PREMIUM_DURATION_DAYS: ${PREMIUM_DURATION_DAYS}
      # Stripe publishable key (safe to expose; substituted into the JS bundle at runtime)
      VITE_STRIPE_PUBLISHABLE_KEY: ${VITE_STRIPE_PUBLISHABLE_KEY}
    # No host port: the frontend is reached only through the Caddy proxy.

  caddy:
    image: caddy:2-alpine
    restart: always
    depends_on:
      - frontend
    ports:
      - "80:80"
      - "443:443"
    environment:
      DOMAIN_NAME: ${DOMAIN_NAME}
      ACME_EMAIL: ${ADMIN_EMAIL}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config

  # One-shot bootstrapper: imports the version-controlled credentials and
  # workflows into n8n's data volume and activates them, then exits. Runs to
  # completion *before* the main n8n service starts, so there is never a second
  # process writing n8n's SQLite database at the same time. Re-runs on every
  # deploy and upserts by ID, so editing a workflow/credential in the repo and
  # redeploying updates the live instance (GitOps-style).
  n8n-init:
    image: n8nio/n8n:latest
    restart: "no"
    environment:
      # MUST match the main n8n service, or imported credentials won't decrypt.
      N8N_ENCRYPTION_KEY: ${N8N_ENCRYPTION_KEY}
    volumes:
      - n8n_data:/home/node/.n8n
      # Rendered (secrets substituted) by the deploy job before `compose up`.
      - ./.n8n-import/credentials:/credentials:ro
      - ./.n8n-import/workflows:/workflows:ro
    entrypoint: ["/bin/sh", "-c"]
    command: >
      "n8n import:credentials --separate --input=/credentials &&
       n8n import:workflow   --separate --input=/workflows &&
       n8n update:workflow   --all --active=true"

  n8n:
    image: n8nio/n8n:latest
    restart: always
    depends_on:
      n8n-init:
        condition: service_completed_successfully
    ports:
      - "5678:5678"
    environment:
      N8N_ENCRYPTION_KEY: ${N8N_ENCRYPTION_KEY}
      WEBHOOK_URL: http://${DOMAIN_NAME}:5678
      GENERIC_TIMEZONE: Africa/Tunis
      N8N_LOG_LEVEL: info
      N8N_SECURE_COOKIE: "false"
    volumes:
      - n8n_data:/home/node/.n8n

volumes:
  db_data:
  uploads:
  n8n_data:
  caddy_data:
  caddy_config:
